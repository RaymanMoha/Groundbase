<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- GroundBase Logo Mark -->
  <defs>
    <linearGradient id="gb-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A6B4F" />
      <stop offset="100%" stop-color="#22C77E" />
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect width="40" height="40" rx="11" fill="url(#gb-gradient)" />
  <rect x="0.5" y="0.5" width="39" height="39" rx="10.5" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" />

  <!-- Ground horizon line -->
  <path d="M8 26 C12 23, 18 23, 20 25 C22 27, 28 27, 32 24" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round" fill="none" />

  <!-- Stem -->
  <path d="M20 25 C20 20, 20 17, 20 14" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" fill="none" />

  <!-- Right leaf -->
  <path d="M20 17 C23 14, 27 13, 28 11 C26 14, 23 16, 20 17Z" fill="rgba(255,255,255,0.9)" />

  <!-- Left leaf (smaller) -->
  <path d="M20 21 C17 19, 14 19, 13 17.5 C15 19, 17 20, 20 21Z" fill="rgba(255,255,255,0.7)" />

  <!-- Data point dots -->
  <circle cx="12" cy="29" r="1.3" fill="rgba(255,255,255,0.4)" />
  <circle cx="28" cy="29" r="1.3" fill="rgba(255,255,255,0.4)" />
  <circle cx="20" cy="31" r="1.3" fill="rgba(255,255,255,0.4)" />
</svg>
